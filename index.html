<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Makes sure the browser passes our web address along to YouTube, which YouTube now
     requires for embedded players (avoids the "Error 153" configuration error). -->
<meta name="referrer" content="strict-origin-when-cross-origin" />
<title>Perfect Pomodoro</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

<style>
  /* ---------- Colours ----------
     Deep navy base; a vibrant lilac / coral / teal / blue / violet / pink palette.
     The accent colour shifts with the mode: coral while working, teal during breaks. */
  :root {
    --bg: #07203E;
    --surface: rgba(255,255,255,0.07);
    --surface-line: rgba(255,255,255,0.14);
    --text: #FFFFFF;
    --muted: #AEC6D2;
    --accent: #FA7A66;        /* work accent (coral) */
    --radius: 16px;
  }
  body[data-mode="break"] { --accent: #12E0C2; }   /* break accent (teal) */

  * { box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Decorative background circles (shared by every screen) ----------
     Nested pairs: a smaller bright circle sitting in front of a larger one, echoing
     the layered shapes in the mural. Fixed in place so they stay put while you scroll. */
  .bg { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
  .blob { position: absolute; border-radius: 50%; }
  .b1 { width: 240px; height: 240px; background: #FF4FA0; opacity: .9; top: -70px; right: -60px; }
  .b2 { width: 130px; height: 130px; background: #B79DF0; opacity: .95; top: -10px; right: 40px; }
  .b3 { width: 260px; height: 260px; background: #12E0C2; opacity: .85; bottom: -110px; left: -70px; }
  .b4 { width: 140px; height: 140px; background: #9D5CFF; opacity: .9; bottom: -20px; left: 70px; }
  .b5 { width: 120px; height: 120px; background: #2E9CFF; opacity: .9; top: 60px; left: -40px; }
  .b6 { width: 110px; height: 110px; background: #FA7A66; opacity: .92; bottom: 80px; right: -34px; }

  /* ---------- Screens ---------- */
  .screen {
    position: relative;
    z-index: 1;
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    padding: 40px 22px;
  }
  .screen.active { display: flex; }
  .wrap { width: 100%; max-width: 460px; margin: auto 0; }

  /* The app's name, shown at the top of the first screen. */
  .wordmark {
    font-family: "Poppins", sans-serif; font-weight: 700;
    font-size: 18px; letter-spacing: .01em; margin: 0 0 30px;
  }
  .wordmark .accent { color: var(--accent); }   /* "Pomodoro" picks up the coral accent */

  /* ---------- Routine cards (the four choices on Step 1) ----------
     Each is a full-width tappable card: a bold name on top, a plain-English
     detail line below. Built as <button>s so they work with keyboard + tap. */
  .routine {
    display: block; width: 100%; text-align: left;
    background: rgba(7,28,56,0.72);
    border: 1px solid var(--surface-line);
    border-radius: 20px; padding: 17px 20px; margin-bottom: 12px;
    color: var(--text); font-family: inherit; cursor: pointer;
    transition: border-color .15s ease;
  }
  .routine:hover, .routine:focus-visible { border-color: var(--accent); outline: none; }
  .routine:active { transform: scale(.99); }
  .routine-name {
    display: block; font-family: "Poppins", sans-serif; font-weight: 600;
    font-size: 16px; margin-bottom: 4px;
  }
  .routine-detail { display: block; font-size: 13px; color: var(--muted); line-height: 1.4; }

  .eyebrow {
    font-size: 11px; letter-spacing: .16em; font-weight: 600;
    color: var(--accent); margin: 0 0 10px;
  }
  h1 {
    font-family: "Poppins", sans-serif; font-weight: 600;
    font-size: clamp(28px, 7vw, 34px); line-height: 1.12; margin: 0 0 26px;
  }

  /* ---------- Cards & inputs ---------- */
  .card {
    background: rgba(7,28,56,0.72);
    border: 1px solid var(--surface-line);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(2px);
  }
  .card-title {
    font-family: "Poppins", sans-serif; font-weight: 600; font-size: 14px;
    margin-bottom: 14px;
  }
  .round-head {
    display: flex; align-items: center; gap: 9px;
    font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px;
    margin-bottom: 14px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Plain, non-editable timing line shown for ready-made routines on Step 2. */
  .timing-readonly {
    margin: -4px 0 14px; font-size: 14px; color: var(--muted);
  }

  label {
    display: block; font-size: 12px; color: var(--muted);
    margin: 14px 0 6px;
  }
  label:first-child { margin-top: 0; }

  .input, .sel, .custom-min {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--surface-line);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit; font-size: 14px;
    padding: 12px 13px;
  }
  .input::placeholder { color: rgba(174,198,210,0.6); }
  .input:focus, .sel:focus, .custom-min:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(250,122,102,0.25);
  }
  .input:disabled { opacity: .4; }

  .sel { appearance: none; -webkit-appearance: none; cursor: pointer; }
  .dur { position: relative; }
  .dur::after {
    content: "▾"; position: absolute; right: 14px; top: 12px;
    color: var(--muted); pointer-events: none;
  }
  .custom-min { margin-top: 8px; }
  .hidden { display: none; }

  .check {
    display: flex; align-items: center; gap: 9px;
    color: var(--muted); font-size: 13px; cursor: pointer; margin: 14px 0 0;
  }
  .check input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }

  /* ---------- Step 1 controls ---------- */
  .stepper { display: flex; align-items: center; gap: 18px; margin-bottom: 28px; }
  .step-btn {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--surface-line); background: transparent;
    color: var(--text); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .step-btn.plus { background: #FF4FA0; border: none; }
  .step-count { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 36px; min-width: 40px; text-align: center; }

  .segmented { display: flex; gap: 10px; margin-bottom: 32px; }
  .seg {
    flex: 1; text-align: center; padding: 13px; border-radius: 12px;
    border: 1px solid var(--surface-line); color: var(--muted);
    font-size: 14px; cursor: pointer;
  }
  .seg.on { background: #12E0C2; color: #042A2A; font-weight: 600; border-color: #12E0C2; }

  /* ---------- Buttons ---------- */
  .btn {
    width: 100%; border: none; border-radius: 14px; padding: 15px;
    font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px;
    cursor: pointer; background: #FF4FA0; color: #fff;
  }
  .btn:active { transform: scale(.99); }
  .btn.ghost { background: transparent; border: 1px solid var(--surface-line); color: var(--muted); }
  .btn-row { display: flex; gap: 12px; margin-top: 8px; }
  .btn-row .btn { flex: 1; }
  .error { color: #FFB3A1; font-size: 13px; margin: 12px 0 0; min-height: 18px; }

  /* ---------- Running screen ---------- */
  .running-inner { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .mode-pill {
    font-size: 12px; letter-spacing: .14em; font-weight: 600; text-transform: none;
    color: var(--accent); border: 1px solid var(--accent);
    padding: 6px 15px; border-radius: 999px; margin-bottom: 20px;
  }
  .clock {
    font-family: "Poppins", sans-serif; font-weight: 700;
    font-size: clamp(64px, 20vw, 120px); line-height: 1;
    font-variant-numeric: tabular-nums; margin-bottom: 22px;
  }
  #player-wrap {
    width: 100%; max-width: 440px; aspect-ratio: 16/9;
    border-radius: var(--radius); overflow: hidden; background: #000;
    border: 1px solid var(--surface-line); margin-bottom: 22px;
  }
  #player-wrap.hidden { display: none; }
  #player { width: 100%; height: 100%; }
  .rest-panel {
    width: 100%; max-width: 440px; aspect-ratio: 16/9;
    border-radius: var(--radius); border: 1px solid var(--surface-line);
    background: rgba(255,255,255,0.05);
    display: none; align-items: center; justify-content: center;
    color: var(--muted); font-size: 15px; margin-bottom: 22px;
  }
  .rest-panel.active { display: flex; }

  /* ---------- Countdown overlay (the 5-second transition) ---------- */
  #countdown {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(4,16,32,0.9); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
  }
  #countdown.active { display: flex; }
  .count-stage { position: relative; width: 240px; height: 240px; }
  #countRing { transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset 1s linear; }
  .count-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: "Poppins", sans-serif; font-weight: 700; font-size: 110px; color: #fff;
  }
  .count-num.pop { animation: pop .55s ease; }
  @keyframes pop { 0%{transform:scale(.75);opacity:.4} 45%{transform:scale(1.07);opacity:1} 100%{transform:scale(1)} }
  .count-label {
    position: absolute; bottom: -46px; left: 0; right: 0; text-align: center;
    color: var(--muted); font-size: 12px; letter-spacing: .14em;
  }

  .check-circle {
    width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--accent);
    color: var(--accent); font-size: 30px;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
  }

  /* ---------- Video library: the "Browse" button + the picker panel ---------- */
  .browse-btn {
    margin-top: 8px; padding: 9px 14px; font-size: 13px;
    background: transparent; border: 1px solid var(--surface-line);
    border-radius: 10px; color: var(--accent); cursor: pointer; font-family: inherit;
  }
  .browse-btn:hover, .browse-btn:focus-visible { border-color: var(--accent); outline: none; }
  .browse-btn:disabled { opacity: .4; cursor: default; }

  #libraryPanel {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(4,16,32,0.92); backdrop-filter: blur(4px);
    display: none; justify-content: center; overflow-y: auto; padding: 24px 18px;
  }
  #libraryPanel.active { display: flex; align-items: flex-start; }
  .lib-sheet { width: 100%; max-width: 520px; }
  .lib-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .lib-head h2 { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 18px; margin: 0; }
  .lib-close {
    background: transparent; border: 1px solid var(--surface-line); color: var(--muted);
    border-radius: 10px; padding: 8px 14px; cursor: pointer; font-family: inherit; font-size: 14px;
  }
  .lib-close:hover, .lib-close:focus-visible { border-color: var(--accent); color: var(--text); outline: none; }
  .lib-controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .lib-selects { display: flex; gap: 10px; }
  .lib-selects .dur { flex: 1; }
  .lib-list { display: flex; flex-direction: column; gap: 12px; }
  .lib-row {
    display: flex; flex-direction: column;
    background: rgba(7,28,56,0.72); border: 1px solid var(--surface-line);
    border-radius: 16px; padding: 14px 16px;
  }
  .lib-title { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px; line-height: 1.3; margin-bottom: 4px; }
  .lib-cat { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .lib-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
  .lib-tag {
    background: rgba(183,157,240,0.14); border: 1px solid rgba(183,157,240,0.4);
    color: #C9B8F4; border-radius: 999px; padding: 4px 11px; font-size: 12px;
    cursor: pointer; font-family: inherit;
  }
  .lib-tag:hover, .lib-tag:focus-visible { border-color: var(--accent); outline: none; }
  .lib-use {
    align-self: flex-start;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: "Poppins", sans-serif;
  }
  .lib-use:active { transform: scale(.99); }
  .lib-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 30px 0; }

  @media (prefers-reduced-motion: reduce) {
    .count-num.pop { animation: none; }
    #countRing { transition: none; }
  }
</style>
</head>
<body data-mode="work">

  <div class="bg">
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="blob b3"></div><div class="blob b4"></div>
    <div class="blob b5"></div><div class="blob b6"></div>
  </div>

  <!-- ============ STEP 1 ============ -->
  <section id="step1" class="screen active">
    <div class="wrap">
      <p class="wordmark">Perfect <span class="accent">Pomodoro</span></p>
      <p class="eyebrow">Step 1 of 2</p>
      <h1>Choose a routine.</h1>

      <button class="routine" data-preset="movement">
        <span class="routine-name">Movement</span>
        <span class="routine-detail">4 rounds · 25 min work / 5 min breaks, with a longer 20 min break at the end</span>
      </button>

      <button class="routine" data-preset="desktime">
        <span class="routine-name">DeskTime</span>
        <span class="routine-detail">2 rounds · 52 min work / 17 min break</span>
      </button>

      <button class="routine" data-preset="ultradian">
        <span class="routine-name">Ultradian</span>
        <span class="routine-detail">2 rounds · 90 min work / 20 min break</span>
      </button>

      <button class="routine" id="routineCustom" data-preset="custom">
        <span class="routine-name">Build your own</span>
        <span class="routine-detail">Pick your own rounds and timings</span>
      </button>

      <!-- Hidden until "Build your own" is tapped — these are the original Step 1 controls. -->
      <div id="buildYourOwn" class="hidden">
        <div class="card" style="margin-top:4px;">
          <label>How many rounds?</label>
          <div class="stepper">
            <button class="step-btn" id="roundsMinus">−</button>
            <div class="step-count" id="roundsCount">4</div>
            <button class="step-btn plus" id="roundsPlus">+</button>
          </div>

          <label>Same timings for every round?</label>
          <div class="segmented">
            <div class="seg on" id="segYes">Yes</div>
            <div class="seg" id="segNo">No</div>
          </div>

          <button class="btn" id="toStep2">Next</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ STEP 2 ============ -->
  <section id="step2" class="screen">
    <div class="wrap">
      <p class="eyebrow">Step 2 of 2</p>
      <h1>Times &amp; playlists.</h1>
      <div id="step2Body"></div>
      <div class="error" id="step2Error"></div>
      <div class="btn-row">
        <button class="btn ghost" id="backTo1">Back</button>
        <button class="btn" id="startSession">Start session</button>
      </div>
    </div>
  </section>

  <!-- ============ RUNNING ============ -->
  <section id="running" class="screen">
    <div class="wrap running-inner">
      <div class="mode-pill" id="modePill">Round 1 of 4 · Work</div>
      <div class="clock" id="clock">25:00</div>
      <div id="player-wrap"><div id="player"></div></div>
      <div class="rest-panel" id="restPanel">Rest. The next round starts on its own.</div>
      <button class="btn ghost" id="endBtn" style="max-width:200px;">End session</button>
    </div>
  </section>

  <!-- ============ COMPLETE ============ -->
  <section id="complete" class="screen">
    <div class="wrap" style="text-align:center;">
      <div class="check-circle">✓</div>
      <h1>Session complete.</h1>
      <p style="color:var(--muted);margin-bottom:24px;">All rounds done. Nicely held.</p>
      <button class="btn" id="againBtn">Set up another</button>
    </div>
  </section>

  <!-- ============ COUNTDOWN OVERLAY ============ -->
  <div id="countdown">
    <div class="count-stage">
      <svg viewBox="0 0 240 240" width="240" height="240">
        <circle cx="120" cy="120" r="104" fill="#FF4FA0" opacity="0.9"></circle>
        <circle cx="120" cy="120" r="82" fill="#9D5CFF" opacity="0.92"></circle>
        <circle cx="120" cy="120" r="60" fill="#2E9CFF" opacity="0.94"></circle>
        <circle cx="120" cy="120" r="40" fill="#12E0C2" opacity="0.96"></circle>
        <circle cx="120" cy="120" r="22" fill="#FA7A66"></circle>
        <circle id="countRing" cx="120" cy="120" r="114" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"></circle>
      </svg>
      <div class="count-num" id="countNum">5</div>
      <div class="count-label" id="countLabel">Up next: break</div>
    </div>
  </div>

  <!-- ============ VIDEO LIBRARY PICKER ============ -->
  <div id="libraryPanel">
    <div class="lib-sheet">
      <div class="lib-head">
        <h2>Video library</h2>
        <button type="button" class="lib-close" id="libClose">Close</button>
      </div>
      <div class="lib-controls">
        <input type="text" class="input" id="libSearch" placeholder="Search by title or tag — e.g. lofi, arms, no words…">
        <div class="lib-selects">
          <div class="dur"><select class="sel" id="libCategory"></select></div>
          <div class="dur"><select class="sel" id="libBestFor">
            <option value="all">Any time</option>
            <option value="work">For work</option>
            <option value="break">For break</option>
          </select></div>
        </div>
      </div>
      <div class="lib-list" id="libList"></div>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
  // =====================================================================
  //  STATE
  // =====================================================================
  const state = {
    numRounds: 4,
    sameTimings: true,
    sharedWork: 1500,   // seconds (25 min) — used when timings are shared
    sharedBreak: 300,   // seconds (5 min)
    rounds: [],         // filled in when the session starts
    roundTimings: null, // per-round lengths when a routine sets them (e.g. Movement); null otherwise
    lockedTimings: false, // true when a ready-made routine fixed the lengths (no pickers shown)
  };

  let player = null, apiReady = false, playerReady = false;
  let audioCtx = null, session = null, videoEnded = false;
  // Remembers how far each single video has played, by its video id, so a video reused
  // later in the same session can carry on instead of restarting. Cleared each new session.
  let resumeAt = {};

  const RING_R = 114;
  const RING_LEN = 2 * Math.PI * RING_R;
  const DOT_COLOURS = ['#FF4FA0','#B79DF0','#9D5CFF','#2E9CFF','#12E0C2','#FA7A66'];

  function onYouTubeIframeAPIReady() { apiReady = true; }

  // =====================================================================
  //  STEP 1 CONTROLS
  // =====================================================================
  const roundsCount = document.getElementById('roundsCount');
  document.getElementById('roundsMinus').addEventListener('click', () => {
    if (state.numRounds > 1) { state.numRounds--; roundsCount.textContent = state.numRounds; }
  });
  document.getElementById('roundsPlus').addEventListener('click', () => {
    if (state.numRounds < 10) { state.numRounds++; roundsCount.textContent = state.numRounds; }
  });

  const segYes = document.getElementById('segYes'), segNo = document.getElementById('segNo');
  segYes.addEventListener('click', () => { state.sameTimings = true; segYes.classList.add('on'); segNo.classList.remove('on'); });
  segNo.addEventListener('click', () => { state.sameTimings = false; segNo.classList.add('on'); segYes.classList.remove('on'); });

  document.getElementById('toStep2').addEventListener('click', () => { buildStep2(); showScreen('step2'); });
  document.getElementById('backTo1').addEventListener('click', () => showScreen('step1'));

  // =====================================================================
  //  ROUTINES — the four cards on Step 1
  // =====================================================================
  // Each ready-made routine sets the number of rounds and the work/break lengths.
  // Same-timings routines (DeskTime, Ultradian) use one shared work/break length.
  // Movement varies by round, so it lists each round's lengths (longer last break).
  const PRESETS = {
    movement: {
      numRounds: 4,
      sameTimings: false,
      roundTimings: [
        { workDur: 1500, breakDur: 300 },   // Round 1 — 25 min work / 5 min break
        { workDur: 1500, breakDur: 300 },   // Round 2 — 25 / 5
        { workDur: 1500, breakDur: 300 },   // Round 3 — 25 / 5
        { workDur: 1500, breakDur: 1200 },  // Round 4 — 25 / 20 (longer wind-down)
      ],
    },
    desktime:  { numRounds: 2, sameTimings: true, sharedWork: 3120, sharedBreak: 1020 }, // 52 / 17
    ultradian: { numRounds: 2, sameTimings: true, sharedWork: 5400, sharedBreak: 1200 }, // 90 / 20
  };

  // Apply a timed routine, then jump straight to Step 2 with everything pre-filled.
  function applyPreset(key) {
    const p = PRESETS[key];
    state.numRounds = p.numRounds;
    state.sameTimings = p.sameTimings;
    state.lockedTimings = true;   // routine fixes the lengths — Step 2 shows them as plain text
    if (p.sameTimings) {
      state.sharedWork = p.sharedWork;
      state.sharedBreak = p.sharedBreak;
      state.roundTimings = null;
    } else {
      state.roundTimings = p.roundTimings;
    }
    buildStep2();
    showScreen('step2');
  }

  // "Build your own": reveal the original controls, reset to a clean 4 rounds / 25 / 5 start.
  function revealBuildYourOwn() {
    state.numRounds = 4;
    state.sameTimings = true;
    state.sharedWork = 1500;
    state.sharedBreak = 300;
    state.roundTimings = null;
    state.lockedTimings = false;   // Build your own keeps the editable length pickers
    roundsCount.textContent = state.numRounds;
    segYes.classList.add('on'); segNo.classList.remove('on');
    document.getElementById('buildYourOwn').classList.remove('hidden');
    document.getElementById('buildYourOwn').scrollIntoView({ block: 'nearest' });
  }

  // Wire up all four cards.
  document.querySelectorAll('.routine').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.preset;
      if (key === 'custom') revealBuildYourOwn();
      else applyPreset(key);
    });
  });

  // =====================================================================
  //  STEP 2 — built to match the number of rounds and the timing choice
  // =====================================================================

  // A reusable duration picker: preset minutes, plus "Match video length" and "Custom".
  function durationControl(prefix, defaultSecs) {
    const presetMins = [5,10,15,20,25,30,35,40,45,50,55,60];
    const defaultMins = Math.round(defaultSecs / 60);
    // Does the wanted length match a dropdown preset? If not, we show "Custom…" pre-filled.
    const matchesPreset = presetMins.includes(defaultMins);

    let opts = '';
    presetMins.forEach(m => {
      const s = m * 60;
      opts += `<option value="${s}" ${matchesPreset && s === defaultSecs ? 'selected' : ''}>${m} min</option>`;
    });
    opts += `<option value="match">Match video length</option>`;
    opts += `<option value="custom" ${matchesPreset ? '' : 'selected'}>Custom…</option>`;

    // For non-preset lengths (e.g. DeskTime 52/17, Ultradian 90) pre-fill and show the minutes box.
    const customValue = matchesPreset ? '' : defaultMins;
    const customClass = matchesPreset ? 'custom-min hidden' : 'custom-min';
    return `<div class="dur"><select class="sel" id="${prefix}-sel">${opts}</select></div>
            <input type="number" class="${customClass}" id="${prefix}-custom" min="1" max="240" value="${customValue}" placeholder="minutes">`;
  }

  function buildStep2() {
    const n = state.numRounds;
    const mins = secs => Math.round(secs / 60) + ' min';   // seconds → "52 min"
    let html = '';

    // Shared-timings card at the top (used when every round has the same lengths).
    if (state.sameTimings) {
      const timingHtml = state.lockedTimings
        ? `<p class="timing-readonly">Work ${mins(state.sharedWork)} · Break ${mins(state.sharedBreak)}</p>`
        : `<label>Work length</label>${durationControl('sharedWork', state.sharedWork)}
           <label>Break length</label>${durationControl('sharedBreak', state.sharedBreak)}`;
      html += `<div class="card">
        <div class="card-title">Timings · all ${n} round${n > 1 ? 's' : ''}</div>
        ${timingHtml}
      </div>`;
    }

    for (let r = 0; r < n; r++) {
      const colour = DOT_COLOURS[r % DOT_COLOURS.length];
      // Pre-fill per-round lengths from a chosen routine if there is one; otherwise the usual 25/5.
      const workDefault = state.roundTimings ? state.roundTimings[r].workDur : 1500;
      const breakDefault = state.roundTimings ? state.roundTimings[r].breakDur : 300;

      // Per-round timings only appear when rounds differ. A locked routine shows them as
      // plain text; Build your own shows the editable pickers.
      let timingBlock = '';
      if (!state.sameTimings) {
        timingBlock = state.lockedTimings
          ? `<p class="timing-readonly">${mins(workDefault)} work · ${mins(breakDefault)} break</p>`
          : `<label>Work length</label>${durationControl('workDur-' + r, workDefault)}
             <label>Break length</label>${durationControl('breakDur-' + r, breakDefault)}`;
      }

      // From round 2 onward, offer to continue the previous round's video (work and break
      // are independent — work only continues work, break only continues break).
      const continueWork = r >= 1
        ? `<label class="check"><input type="checkbox" class="continue-work" id="continueWork-${r}" data-r="${r}"> Continue the work video from the previous round</label>`
        : '';
      const continueBreak = r >= 1
        ? `<label class="check"><input type="checkbox" class="continue-break" id="continueBreak-${r}" data-r="${r}"> Continue the break video from the previous round</label>`
        : '';

      html += `<div class="card">
        <div class="round-head"><span class="dot" style="background:${colour}"></span>Round ${r + 1}</div>
        ${timingBlock}
        ${continueWork}
        <div id="workEntry-${r}">
          <label>Work playlist link</label>
          <input class="input" id="workLink-${r}" placeholder="YouTube playlist or video link…">
          <button type="button" class="browse-btn" data-target="workLink-${r}">＋ Browse library</button>
        </div>
        ${continueBreak}
        <label class="check"><input type="checkbox" class="nothing" id="breakNothing-${r}" data-r="${r}"> Play nothing during this break</label>
        <div id="breakEntry-${r}">
          <label>Break playlist link</label>
          <input class="input" id="breakLink-${r}" placeholder="YouTube playlist or video link…">
          <button type="button" class="browse-btn" id="browseBreak-${r}" data-target="breakLink-${r}">＋ Browse library</button>
        </div>
      </div>`;
    }
    document.getElementById('step2Body').innerHTML = html;
    document.getElementById('step2Error').textContent = '';
  }

  // Show the custom-minutes box when "Custom…" is chosen; react to the "nothing" checkbox.
  document.getElementById('step2Body').addEventListener('change', (e) => {
    if (e.target.classList.contains('sel')) {
      const custom = document.getElementById(e.target.id.replace('-sel', '-custom'));
      if (custom) custom.classList.toggle('hidden', e.target.value !== 'custom');
    }
    if (e.target.classList.contains('continue-work')) {
      const r = e.target.dataset.r;
      const entry = document.getElementById('workEntry-' + r);
      if (entry) entry.classList.toggle('hidden', e.target.checked);   // no link needed when continuing
    }
    if (e.target.classList.contains('continue-break')) {
      const r = e.target.dataset.r;
      const entry = document.getElementById('breakEntry-' + r);
      if (entry) entry.classList.toggle('hidden', e.target.checked);
      // "Continue break" and "Play nothing" can't both be on.
      const nothing = document.getElementById('breakNothing-' + r);
      if (nothing) { if (e.target.checked) nothing.checked = false; nothing.disabled = e.target.checked; }
    }
    if (e.target.classList.contains('nothing')) {
      const r = e.target.dataset.r;
      const link = document.getElementById('breakLink-' + r);
      link.disabled = e.target.checked;
      if (e.target.checked) link.value = '';
      // Also grey out that round's break "Browse library" button.
      const browseBreak = document.getElementById('browseBreak-' + r);
      if (browseBreak) browseBreak.disabled = e.target.checked;
      // "Play nothing" and "Continue break" can't both be on.
      const cont = document.getElementById('continueBreak-' + r);
      if (cont) { if (e.target.checked) cont.checked = false; cont.disabled = e.target.checked;
                  const entry = document.getElementById('breakEntry-' + r);
                  if (entry && !e.target.checked) entry.classList.remove('hidden'); }
      // If this round has its own break-duration picker, switch "match" off (no video to match).
      const sel = document.getElementById('breakDur-' + r + '-sel');
      if (sel) {
        const matchOpt = sel.querySelector('option[value="match"]');
        if (matchOpt) matchOpt.disabled = e.target.checked;
        if (e.target.checked && sel.value === 'match') sel.value = '300';
      }

  let pickerTarget = null;   // the id of the link box we'll fill when a video is picked

  // Build the Category dropdown from whatever categories actually exist in the library.
  function fillCategoryOptions() {
    const cats = [...new Set(LIBRARY.map(v => v.category))];

  // Draw the rows that match the current search + dropdown filters.
  function renderLibrary() {
    const q = document.getElementById('libSearch').value.trim().toLowerCase();
    const cat = document.getElementById('libCategory').value;
    const best = document.getElementById('libBestFor').value;

    const matches = LIBRARY.filter(item => {
      if (cat !== 'all' && item.category !== cat) return false;
      if (best !== 'all' && item.bestFor !== best && item.bestFor !== 'both') return false;
      if (q) {
        const haystack = (item.title + ' ' + item.category + ' ' + item.tags.join(' ')).toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });

    const list = document.getElementById('libList');
    if (matches.length === 0) {
      list.innerHTML = '<div class="lib-empty">No videos match. Try clearing the search or filters.</div>';

    list.innerHTML = matches.map(item => {
      const tags = item.tags.map(t => `<button type="button" class="lib-tag" data-tag="${t}">${t}</button>`).join('');

  // =====================================================================
  //  READING WHAT WAS TYPED
  // =====================================================================
  function parseYouTube(raw) {
    if (!raw) return null;
    const text = raw.trim();
    if (!text.includes('http') && /^[A-Za-z0-9_-]{11,}$/.test(text)) return { type: 'playlist', id: text };
    try {
      const url = new URL(text);
      const list = url.searchParams.get('list');
      if (list) return { type: 'playlist', id: list };
      let v = url.searchParams.get('v');
      if (!v && url.hostname.includes('youtu.be')) v = url.pathname.slice(1);
      // Path-style links: youtube.com/live/ID, /embed/ID, /shorts/ID
      if (!v) {
        const m = url.pathname.match(/\/(?:live|embed|shorts)\/([A-Za-z0-9_-]+)/);
        if (m) v = m[1];
      }
      if (v) return { type: 'video', id: v };
    } catch (e) { return null; }
    return null;
  }

  // Read a duration picker → seconds, or the string 'match', or null if invalid.
  function readDuration(prefix) {
    const sel = document.getElementById(prefix + '-sel');
    if (!sel) return null;
    if (sel.value === 'match') return 'match';
    if (sel.value === 'custom') {
      const m = parseInt(document.getElementById(prefix + '-custom').value, 10);
      return (!m || m < 1) ? null : m * 60;
    }
    return parseInt(sel.value, 10);
  }

  function readStep2() {
    const err = document.getElementById('step2Error');
    err.textContent = '';
    const rounds = [];

    if (state.sameTimings && !state.lockedTimings) {
      const w = readDuration('sharedWork'), b = readDuration('sharedBreak');
      if (w === null || b === null) { err.textContent = 'Please enter a valid custom length (in minutes).'; return false; }
      state.sharedWork = w; state.sharedBreak = b;
    }

    for (let r = 0; r < state.numRounds; r++) {
      // Work: either continue the previous round's work video, or read this round's link.
      const cw = document.getElementById('continueWork-' + r);
      const workContinue = !!(cw && cw.checked);
      let work = null;
      if (!workContinue) {
        work = parseYouTube(document.getElementById('workLink-' + r).value);
        if (!work) { err.textContent = `Round ${r + 1}: add a YouTube link for the work part.`; return false; }
      }

      // Break: continue, play nothing, or read this round's link.
      const cb = document.getElementById('continueBreak-' + r);
      const breakContinue = !!(cb && cb.checked);
      const nothing = document.getElementById('breakNothing-' + r).checked;
      let brk = null;
      if (!breakContinue && !nothing) {
        brk = parseYouTube(document.getElementById('breakLink-' + r).value);
        if (!brk) { err.textContent = `Round ${r + 1}: add a break link, or tick "Play nothing".`; return false; }
      }

      let workDur, breakDur;
      if (state.sameTimings) {
        workDur = state.sharedWork; breakDur = state.sharedBreak;
      } else if (state.lockedTimings) {
        workDur = state.roundTimings[r].workDur;   // Movement: lengths fixed by the routine
        breakDur = state.roundTimings[r].breakDur;
      } else {
        workDur = readDuration('workDur-' + r);
        breakDur = readDuration('breakDur-' + r);
        if (workDur === null || breakDur === null) { err.textContent = `Round ${r + 1}: enter a valid custom length.`; return false; }
      }

      rounds.push({ workContent: work, breakContent: brk, breakNothing: nothing,
                    workContinue, breakContinue, workDur, breakDur });
    }
    state.rounds = rounds;
    return true;
  }

  // =====================================================================
  //  THE PLAYER
  // =====================================================================
  function createPlayer() {
    return new Promise((resolve) => {
      if (playerReady) { resolve(); return; }
      player = new YT.Player('player', {
        width: '100%', height: '100%',
        playerVars: { playsinline: 1, rel: 0 },
        events: {
          onReady: () => { playerReady = true; resolve(); },
          onStateChange: (e) => { if (e.data === YT.PlayerState.ENDED) videoEnded = true; },
        },
      });
    });
  }

  function loadContent(content, resume) {
    if (!player || !content) return;
    videoEnded = false;
    player.setVolume(100);
    if (content.type === 'playlist') {
      player.loadPlaylist({ listType: 'playlist', list: content.id });
    } else {
      // Resume from the saved spot only when this phase is meant to continue; otherwise start at 0.
      const startSeconds = resume ? (resumeAt[content.id] || 0) : 0;
      player.loadVideoById({ videoId: content.id, startSeconds });
    }
  }
  function stopPlayer() { if (player && playerReady) { try { player.stopVideo(); } catch (e) {} } }

  // =====================================================================
  //  BEEPS
  // =====================================================================
  function beep(freq, durMs) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.frequency.value = freq; osc.type = 'sine';
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.02);
    gain.gain.linearRampToValueAtTime(0, t + durMs / 1000);
    osc.start(t); osc.stop(t + durMs / 1000 + 0.02);
  }
  const countBeep = () => beep(880, 160);
  const goBeep = () => beep(1280, 320);

  // =====================================================================
  //  SCREENS & DISPLAY
  // =====================================================================
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }
  function setMode(kind) { document.body.setAttribute('data-mode', kind); }
  function formatTime(secs) {
    const m = Math.floor(secs / 60), s = secs % 60;
    return m + ':' + String(s).padStart(2, '0');
  }
  function updateClock(secs) { document.getElementById('clock').textContent = formatTime(Math.max(0, secs)); }

  // =====================================================================
  //  TIMERS
  // =====================================================================

  // Fixed-length phase: counts down a set number of seconds.
  function runTimer(totalSecs) {
    return new Promise((resolve) => {
      const endAt = Date.now() + totalSecs * 1000;
      updateClock(totalSecs);
      const t = setInterval(() => {
        if (session.cancelled) { clearInterval(t); resolve(); return; }
        const left = Math.round((endAt - Date.now()) / 1000);
        updateClock(left);
        if (Date.now() >= endAt) { clearInterval(t); resolve(); }
      }, 250);
    });
  }

  // "Match video length" phase: runs until the single video finishes.
  function runMatchVideo() {
    return new Promise((resolve) => {
      const t = setInterval(() => {
        if (session.cancelled || videoEnded) { clearInterval(t); resolve(); return; }
        try {
          const dur = player.getDuration(), cur = player.getCurrentTime();
          if (dur > 0) updateClock(Math.ceil(dur - cur));
        } catch (e) {}
      }, 250);
    });
  }

  // The 5-second transition: nested rings, a pulsing number, and a beep each second.
  function runCountdown(nextLabel) {
    return new Promise((resolve) => {
      const overlay = document.getElementById('countdown');
      const numEl = document.getElementById('countNum');
      const ring = document.getElementById('countRing');
      document.getElementById('countLabel').textContent = 'Up next: ' + nextLabel;

      ring.style.strokeDasharray = RING_LEN;
      ring.style.transition = 'none';
      ring.style.strokeDashoffset = '0';
      if (player && playerReady) { try { player.setVolume(12); } catch (e) {} }  // dip the music
      overlay.classList.add('active');

      const show = (v) => { numEl.textContent = v; numEl.classList.remove('pop'); void numEl.offsetWidth; numEl.classList.add('pop'); };
      let n = 5;
      show(n); countBeep();
      requestAnimationFrame(() => { ring.style.transition = 'stroke-dashoffset 5s linear'; ring.style.strokeDashoffset = RING_LEN; });

      const t = setInterval(() => {
        if (session.cancelled) { clearInterval(t); overlay.classList.remove('active'); resolve(); return; }
        n--;
        if (n >= 1) { show(n); countBeep(); }
        else { clearInterval(t); goBeep(); overlay.classList.remove('active'); resolve(); }
      }, 1000);
    });
  }

  // =====================================================================
  //  THE FULL RUN
  // =====================================================================

  // Turn the rounds into a flat list of phases to play one after another.
  function buildPhases() {
    const phases = [];
    let lastWork = null, lastBreak = null;   // the most recent work/break video, for "continue"
    for (let r = 0; r < state.numRounds; r++) {
      const rd = state.rounds[r];

      // WORK — continue the previous round's work video, or use this round's own.
      const workContent = rd.workContinue ? lastWork : rd.workContent;
      phases.push({ kind: 'work', round: r, dur: rd.workDur, content: workContent,
                    nothing: false, continueFromPrev: !!rd.workContinue });
      lastWork = workContent;

      // BREAK — continue, play nothing, or use this round's own video.
      let breakContent, breakNothing;
      if (rd.breakContinue) {
        breakContent = lastBreak;                 // inherit the previous break video
        breakNothing = (breakContent === null);   // if there wasn't one, it's just a quiet break
      } else {
        breakNothing = rd.breakNothing;
        breakContent = breakNothing ? null : rd.breakContent;
      }
      const bdur = breakNothing && rd.breakDur === 'match' ? 0 : rd.breakDur;
      phases.push({ kind: 'break', round: r, dur: bdur, content: breakContent,
                    nothing: breakNothing, continueFromPrev: !!rd.breakContinue && !breakNothing });
      lastBreak = breakContent;
    }
    return phases;
  }

  function phaseLabel(p) {
    if (p.kind === 'work') return 'focus time';
    return p.nothing ? 'quiet break' : 'break';
  }

  async function runPhase(p) {
    setMode(p.kind);
    document.getElementById('modePill').textContent =
      `Round ${p.round + 1} of ${state.numRounds} · ${p.kind === 'work' ? 'Work' : 'Break'}`;

    const wrap = document.getElementById('player-wrap'), rest = document.getElementById('restPanel');
    if (p.kind === 'break' && p.nothing) {
      stopPlayer(); wrap.classList.add('hidden'); rest.classList.add('active');
    } else {
      wrap.classList.remove('hidden'); rest.classList.remove('active');
      loadContent(p.content, p.continueFromPrev);
    }

    if (p.dur === 'match') {
      await runMatchVideo();
      // A matched video played to its end, so start fresh if it's ever reused.
      if (p.content && p.content.type === 'video') delete resumeAt[p.content.id];
    } else if (p.dur > 0) {
      await runTimer(p.dur);
      // Remember where a single video reached so a later phase can carry on from there.
      // If it ran out during this phase, forget it so it restarts cleanly next time.
      if (p.content && p.content.type === 'video' && player && playerReady) {
        try {
          if (videoEnded) delete resumeAt[p.content.id];
          else resumeAt[p.content.id] = player.getCurrentTime();
        } catch (e) {}
      }
    }
    // (dur of 0 = skip straight through)
  }

  async function runSession() {
    session = { cancelled: false };
    resumeAt = {};   // fresh session → every video starts from the beginning
    const phases = buildPhases();
    showScreen('running');

    for (let i = 0; i < phases.length; i++) {
      // Countdown before every phase — now including the first work phase, so you get
      // a 5-second run-in right after pressing Start, before the first video plays.
      await runCountdown(phaseLabel(phases[i]));
      if (session.cancelled) return;
      await runPhase(phases[i]);
      if (session.cancelled) return;
    }
    await runCountdown('all done');
    if (session.cancelled) return;
    stopPlayer();
    showScreen('complete');
  }

  // =====================================================================
  //  START / END
  // =====================================================================
  document.getElementById('startSession').addEventListener('click', async () => {
    if (!readStep2()) return;

    // First tap unlocks sound and builds the player.
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (!apiReady) { document.getElementById('step2Error').textContent = 'Still loading the player — tap Start again in a second.'; return; }
    await createPlayer();
    runSession();
  });

  document.getElementById('endBtn').addEventListener('click', () => {
    if (session) session.cancelled = true;
    document.getElementById('countdown').classList.remove('active');
    stopPlayer(); setMode('work'); showScreen('step1');
  });

  document.getElementById('againBtn').addEventListener('click', () => { setMode('work'); showScreen('step1'); });
  </script>
</body>
</html>
